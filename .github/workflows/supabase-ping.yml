name: Supabase Anti-Pause Ping

on:
  schedule:
    - cron: '0 10 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase - L2Connect Dashboard
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://kwhgqhbgelmvnmwmgkxg.supabase.co/auth/v1/health" \
            -H "apikey: sb_publishable_BBwXF2eGAmKvX1HKqiLrcA_Y-ewnp0B" \
            -H "Authorization: Bearer sb_publishable_BBwXF2eGAmKvX1HKqiLrcA_Y-ewnp0B")
          echo "Status HTTP: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Supabase respondeu com sucesso"
          else
            echo "⚠️ Resposta inesperada: $response"
          fi
